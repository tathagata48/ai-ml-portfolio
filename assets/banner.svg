<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI and Machine Learning portfolio banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" rx="20" fill="url(#bg)"/>
  <circle cx="1050" cy="90" r="280" fill="url(#glow)"/>
  <circle cx="180" cy="320" r="220" fill="url(#glow)" opacity="0.5"/>

  <!-- subtle dotted grid -->
  <g fill="#ffffff" opacity="0.05">
    <!-- generated dots -->
    <g>
      <circle cx="60" cy="60" r="2"/><circle cx="120" cy="60" r="2"/><circle cx="180" cy="60" r="2"/><circle cx="240" cy="60" r="2"/>
      <circle cx="60" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="180" cy="120" r="2"/>
      <circle cx="60" cy="180" r="2"/><circle cx="120" cy="180" r="2"/>
    </g>
  </g>

  <!-- neural network motif (right side) -->
  <g stroke="#22d3ee" stroke-width="1.2" opacity="0.35">
    <line x1="980" y1="110" x2="1080" y2="80"/>
    <line x1="980" y1="110" x2="1080" y2="160"/>
    <line x1="980" y1="110" x2="1080" y2="240"/>
    <line x1="980" y1="200" x2="1080" y2="80"/>
    <line x1="980" y1="200" x2="1080" y2="160"/>
    <line x1="980" y1="200" x2="1080" y2="240"/>
    <line x1="980" y1="290" x2="1080" y2="160"/>
    <line x1="980" y1="290" x2="1080" y2="240"/>
    <line x1="1080" y1="80"  x2="1180" y2="140"/>
    <line x1="1080" y1="160" x2="1180" y2="140"/>
    <line x1="1080" y1="160" x2="1180" y2="220"/>
    <line x1="1080" y1="240" x2="1180" y2="220"/>
  </g>
  <g>
    <g fill="#a78bfa">
      <circle cx="980" cy="110" r="7"/><circle cx="980" cy="200" r="7"/><circle cx="980" cy="290" r="7"/>
    </g>
    <g fill="#22d3ee">
      <circle cx="1080" cy="80" r="7"/><circle cx="1080" cy="160" r="7"/><circle cx="1080" cy="240" r="7"/>
    </g>
    <g fill="#34d399">
      <circle cx="1180" cy="140" r="7"/><circle cx="1180" cy="220" r="7"/>
    </g>
  </g>

  <!-- text -->
  <text x="80" y="150" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="800" fill="url(#title)">AI &amp; Machine Learning</text>
  <text x="84" y="200" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">Deep learning labs &amp; applied projects — from first principles to production-style pipelines</text>

  <!-- tech pills -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600">
    <g>
      <rect x="84"  y="248" width="118" height="40" rx="20" fill="#ffffff" opacity="0.08"/>
      <text x="143" y="274" fill="#e2e8f0" text-anchor="middle">PyTorch</text>
    </g>
    <g>
      <rect x="214" y="248" width="140" height="40" rx="20" fill="#ffffff" opacity="0.08"/>
      <text x="284" y="274" fill="#e2e8f0" text-anchor="middle">TensorFlow</text>
    </g>
    <g>
      <rect x="366" y="248" width="180" height="40" rx="20" fill="#ffffff" opacity="0.08"/>
      <text x="456" y="274" fill="#e2e8f0" text-anchor="middle">Computer Vision</text>
    </g>
    <g>
      <rect x="558" y="248" width="150" height="40" rx="20" fill="#ffffff" opacity="0.08"/>
      <text x="633" y="274" fill="#e2e8f0" text-anchor="middle">GANs &amp; RNNs</text>
    </g>
  </g>
</svg>
